name: release

on:
  workflow_dispatch:
  push:
    branches:
      - "release-ci"
      - "release-ci/**"
    tags:
      - "v*"

permissions:
  contents: read

env:
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'v0.0.0' }}
  RELEASE_SOURCE_REF: ${{ startsWith(github.ref, 'refs/tags/v') && format('refs/tags/{0}', github.ref_name) || github.sha }}

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  build-linux:
    name: linux ${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build binaries
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          COMMIT: ${{ github.sha }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')" scripts/release/build-binaries.sh

      - name: Package archives
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          scripts/release/package-tarball.sh
          scripts/release/package-deb.sh
          scripts/release/package-rpm.sh

      - name: Attest packages
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  build-macos:
    name: macos arm64
    runs-on: macos-26
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          COMMIT: ${{ github.sha }}
          GOOS: darwin
          GOARCH: arm64
        run: DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')" scripts/release/build-binaries.sh

      - name: Package tarball
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOOS: darwin
          GOARCH: arm64
        run: scripts/release/package-tarball.sh

      - name: Package signed and notarized pkg
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOARCH: arm64
          MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_PASSWORD }}
          MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          MACOS_DEVELOPER_ID_INSTALLER_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_PASSWORD }}
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: scripts/release/package-pkg.sh

      - name: Package unsigned pkg dry run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GOARCH: arm64
          MACOS_PKG_SIGNING_MODE: unsigned
        run: scripts/release/package-pkg.sh

      - name: Attest packages
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.pkg

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos-arm64
          path: |
            dist/*.tar.gz
            dist/*.pkg
          if-no-files-found: error

  homebrew-bottles:
    name: homebrew bottle ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: validate
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-26
          - name: macos-amd64
            runner: macos-26-intel
          - name: linux-amd64
            runner: ubuntu-24.04
          - name: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Install Homebrew on Linux
        if: runner.os == 'Linux'
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Create local tap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          brew tap-new clarifiedlabs/homebrew-tap
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$(brew --repository clarifiedlabs/homebrew-tap)" >> "$GITHUB_ENV"

      - name: Prepare formula
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          curl -fsSL -o "${RUNNER_TEMP}/source.tar.gz" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "${RUNNER_TEMP}/source.tar.gz" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh

      - name: Build bottle
        env:
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          cd "$TAP_DIR"
          formulas=(
            clarifiedlabs/homebrew-tap/harness
            clarifiedlabs/homebrew-tap/harness-model-proxy
            clarifiedlabs/homebrew-tap/harness-mcp-proxy
            clarifiedlabs/homebrew-tap/harness-full
          )
          for formula in "${formulas[@]}"; do
            brew install --build-bottle "$formula"
            brew test "$formula"
            brew bottle --json --root-url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}" "$formula"
          done
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          mv ./*.bottle.* "${GITHUB_WORKSPACE}/dist/"

      - name: Attest bottles
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*.bottle.*

      - name: Upload bottles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-bottle-${{ matrix.name }}
          path: dist/*.bottle.*
          if-no-files-found: error

  container-images:
    name: container image ${{ matrix.package }}
    runs-on: ubuntu-24.04
    needs: build-linux
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: harness
            binary: harness
            image: ghcr.io/clarifiedlabs/harness
            title: harness
            workbench: "true"
          - package: harness-model-proxy
            binary: harness-model-proxy
            image: ghcr.io/clarifiedlabs/harness-model-proxy
            title: harness-model-proxy
            workbench: "false"
          - package: harness-mcp-proxy
            binary: harness-mcp-proxy
            image: ghcr.io/clarifiedlabs/harness-mcp-proxy
            title: harness-mcp-proxy
            workbench: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download Linux packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-linux-*
          path: dist
          merge-multiple: true

      - name: Prepare image metadata
        id: image-meta
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          version="${VERSION#v}"
          created="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "version=${version}"
            echo "created=${created}"
            echo "tags<<TAGS"
            echo "${IMAGE}:${version}"
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              echo "${IMAGE}:latest"
            fi
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/binary.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.image-meta.outputs.tags }}
          build-args: |
            PACKAGE=${{ matrix.package }}
            BINARY=${{ matrix.binary }}
            VERSION=${{ steps.image-meta.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.image-meta.outputs.created }}
            IMAGE_TITLE=${{ matrix.title }}
            INSTALL_WORKBENCH=${{ matrix.workbench }}

      - name: Attest image
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish:
    name: publish release
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-linux
      - build-macos
      - container-images
      - homebrew-bottles
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download Homebrew bottle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: scripts/release/checksums.sh

      - name: Attest checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi

  publish-dry-run:
    name: publish release dry run
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-linux
      - build-macos
      - container-images
      - homebrew-bottles
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download Homebrew bottle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: scripts/release/checksums.sh

      - name: Verify release payload
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          pkg_version="${VERSION#v}"
          required_patterns=(
            "dist/harness_${VERSION}_linux_amd64.tar.gz"
            "dist/harness_${VERSION}_linux_arm64.tar.gz"
            "dist/harness_${VERSION}_darwin_arm64.tar.gz"
            "dist/harness_${VERSION}_darwin_arm64.pkg"
            "dist/harness_${pkg_version}_amd64.deb"
            "dist/harness_${pkg_version}_arm64.deb"
            "dist/harness-model-proxy_${pkg_version}_amd64.deb"
            "dist/harness-model-proxy_${pkg_version}_arm64.deb"
            "dist/harness-mcp-proxy_${pkg_version}_amd64.deb"
            "dist/harness-mcp-proxy_${pkg_version}_arm64.deb"
            "dist/harness-${pkg_version}-1.x86_64.rpm"
            "dist/harness-${pkg_version}-1.aarch64.rpm"
            "dist/harness-model-proxy-${pkg_version}-1.x86_64.rpm"
            "dist/harness-model-proxy-${pkg_version}-1.aarch64.rpm"
            "dist/harness-mcp-proxy-${pkg_version}-1.x86_64.rpm"
            "dist/harness-mcp-proxy-${pkg_version}-1.aarch64.rpm"
            "dist/*.bottle.*"
            "dist/checksums.txt"
          )
          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "$pattern" >/dev/null; then
              echo "missing dry-run artifact matching ${pattern}" >&2
              exit 1
            fi
          done
          find dist -maxdepth 1 -type f -print | sort
          echo "Dry run only: would publish ${VERSION} artifacts for ${GITHUB_SHA}"

  homebrew-publish-dry-run:
    name: publish homebrew tap dry run
    runs-on: ubuntu-24.04
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: homebrew-bottles
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          path: source

      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Create local tap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          brew tap-new clarifiedlabs/homebrew-tap
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$(brew --repository clarifiedlabs/homebrew-tap)" >> "$GITHUB_ENV"

      - name: Download bottle metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: bottles
          merge-multiple: true

      - name: Update formula dry run
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          cd source
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          curl -fsSL -o "${RUNNER_TEMP}/source.tar.gz" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "${RUNNER_TEMP}/source.tar.gz" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh
          cd "$TAP_DIR"
          shopt -s nullglob
          bottle_jsons=("${GITHUB_WORKSPACE}"/bottles/*.json)
          shopt -u nullglob
          if [[ ${#bottle_jsons[@]} -eq 0 ]]; then
            echo "no bottle JSON artifacts found" >&2
            exit 1
          fi
          for bottle_json in "${bottle_jsons[@]}"; do
            brew bottle --merge --write --no-commit "$bottle_json"
          done
          git diff -- Formula
          echo "Dry run only: would update ClarifiedLabs/homebrew-tap for ${TAG}"

  homebrew-publish:
    name: publish homebrew tap
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: publish
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          path: source

      - name: Create tap token
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ClarifiedLabs
          repositories: homebrew-tap
          permission-contents: write

      - name: Checkout tap
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          repository: ClarifiedLabs/homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap

      - name: Install Homebrew
        run: |
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Register tap checkout
        run: |
          tap_dir="$(brew --repository clarifiedlabs/homebrew-tap)"
          rm -rf "$tap_dir"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "${GITHUB_WORKSPACE}/homebrew-tap" "$tap_dir"
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/homebrew-tap"
          git config --global --add safe.directory "$tap_dir"
          brew trust clarifiedlabs/tap
          echo "TAP_DIR=$tap_dir" >> "$GITHUB_ENV"

      - name: Download bottle metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: bottles
          merge-multiple: true

      - name: Update formula
        env:
          TAG: ${{ env.RELEASE_VERSION }}
          SOURCE_REF: ${{ env.RELEASE_SOURCE_REF }}
        run: |
          cd source
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/${SOURCE_REF}.tar.gz"
          curl -fsSL -o "${RUNNER_TEMP}/source.tar.gz" "$SOURCE_URL"
          SOURCE_SHA256="$(shasum -a 256 "${RUNNER_TEMP}/source.tar.gz" | awk '{print $1}')"
          SOURCE_URL="$SOURCE_URL" SOURCE_SHA256="$SOURCE_SHA256" scripts/release/homebrew-formula.sh
          cd "$TAP_DIR"
          shopt -s nullglob
          bottle_jsons=("${GITHUB_WORKSPACE}"/bottles/*.json)
          shopt -u nullglob
          if [[ ${#bottle_jsons[@]} -eq 0 ]]; then
            echo "no bottle JSON artifacts found" >&2
            exit 1
          fi
          for bottle_json in "${bottle_jsons[@]}"; do
            brew bottle --merge --write --no-commit "$bottle_json"
          done

      - name: Commit tap update
        env:
          TAG: ${{ env.RELEASE_VERSION }}
        run: |
          cd homebrew-tap
          git config user.name "${{ steps.tap-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.tap-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add Formula/harness.rb Formula/harness-model-proxy.rb Formula/harness-mcp-proxy.rb Formula/harness-full.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes"
          else
            git commit -m "chore: update harness ${TAG}"
            git push
          fi
